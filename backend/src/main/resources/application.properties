spring.application.name=backend
# ===== Server =====
server.port=8080

# ===== Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_pos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
app.jwt.secret=ThisIsAVeryLongSecretKeyForJwtTokenGenerationChangeInProduction12345
app.jwt.expiration-ms=86400000

# ===== Logging =====
logging.level.org.springframework.security=DEBUG

# ===== File Storage =====
app.upload.dir=uploads
app.upload.max-size-mb=5

# in application.properties
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB