spring.application.name=backend

# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== Database =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurant_pos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===== Logging =====
logging.level.org.springframework.security=INFO
logging.level.com.restaurantpos=INFO

# ===== File Storage =====
app.upload.dir=${UPLOAD_DIR:uploads}
app.upload.max-size-mb=${UPLOAD_MAX_SIZE_MB:5}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB